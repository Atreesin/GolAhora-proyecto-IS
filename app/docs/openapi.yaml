paths:
  /clubes:
    get:
      tags:
        - "Acceso: Público"
        - "Información"
      summary: Obtener lista de clubes
      description: Devuelve la lista de todos los clubes registrados en el sistema.
      responses:
        '200':
          description: Lista de clubes
          content:
            aplication/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Club'

  /clubes/full_info:
    get:
      tags:
        - "Acceso: Público"
        - "Información"
      summary: Obtener lista detallada de clubes
      description: Devuelve la lista con la información completa de todos los clubes registrados en el sistema.
      responses:
        '200':
          description: Lista de clubes
          content:
            aplication/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClubDetalle'

  /clubes/club_id={id}:
    get:
      tags:
        - "Acceso: Público"
        - "Información"
      summary: Obtener club por ID
      description: Devuelve la información básica de un club (id, nombre, CUIT)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Información básica del club
          content:
            aplication/json:
              schema:
                $ref: '#/components/schemas/Club'
        '404':
          description: Club no encontrado

  /clubes/club_id={id}/full_info:
    get:
      tags:
        - "Acceso: Público"
        - "Información"
      summary: Obtener clube detallado por ID
      description: Devuelve la información completa de un club.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Información detallada del club
          content:
            aplication/json:
              schema:
                $ref: '#/components/schemas/ClubDetalle'
        '404':
          description: Club no encontrado

  /users:
    get:
      tags:
        - "Acceso: Administradores"
        - "Módulo: Gestión de Usuarios"
      summary: Obtener todos los usuarios
      description: |
        Acceso restringido a administradores.
        - Web: requiere header `plataform: web` y cookie de sesión ( `X-Auth-Token: jwt=....` desde Swager UI).

        - Windows Forms: requiere header `plataform: windows` y token en `Authorization`.
      parameters:
        - name: plataform
          in: header
          required: true
          schema:
            type: string
            enum: [web, windows]
          description: Plataforma desde la cual se accede.
        - name: X-Auth-Token
          in: header
          required: false
          schema:
            type: string
            pattern: '^jwt=.*$'
          description: |
            Autenticación vía JWT en header (Swagger UI / apps externas)
            Se utiliza como alternativa a la cookie `jwt` para pruebas desde Swagger UI,
            ya que Swagger no puede manejar cookies automáticamente como un navegador.
      security:
        - cookieAuth: []  
        - authorization: []  
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Usuario'
        '401':
          description: No autenticado
        '403':
          description: Acceso denegado

  /users/cantidad:
    get:
      tags:
        - "Acceso: Administradores"
        - "Módulo: Gestión de Usuarios"
        - "Información"
      summary: Obtener cantidad de usuarios registrados en el sistema.
      description: |
        Acceso restringido a administradores.
        - Web: requiere header `plataform: web` y cookie de sesión ( `X-Auth-Token: jwt=....` desde Swager UI).

        - Windows Forms: requiere header `plataform: windows` y token en `Authorization`.
      parameters:
        - name: plataform
          in: header
          required: true
          schema:
            type: string
            enum: [web, windows]
          description: Plataforma desde la cual se accede.
        - name: X-Auth-Token
          in: header
          required: false
          schema:
            type: string
            pattern: '^jwt=.*$'
          description: |
            Autenticación vía JWT en header (Swagger UI / apps externas)
            Se utiliza como alternativa a la cookie `jwt` para pruebas desde Swagger UI,
            ya que Swagger no puede manejar cookies automáticamente como un navegador.
      security:
        - cookieAuth: []  
        - authorization: []
      responses:
        '200':
          description: Cantidad de usuarios registrados
          content:
            aplication/json:
              schema:
                type: integer
          
  /users/user_id={id}:
    get:
      tags:
        - "Acceso: Administradores"
        - "Módulo: Gestión de Usuarios"
      summary: Obtener datos de un usuario por ID
      description: |
        Acceso restringido a administradores.
        - Web: requiere header `plataform: web` y cookie de sesión ( `X-Auth-Token: jwt=....` desde Swager UI).

        - Windows Forms: requiere header `plataform: windows` y token en `Authorization`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 1
          description: id del usuario
        - name: plataform
          in: header
          required: true
          schema:
            type: string
            enum: [web, windows]
          description: Plataforma desde la cual se accede.
        - name: X-Auth-Token
          in: header
          required: false
          schema:
            type: string
            pattern: '^jwt=.*$'
          description: |
            Autenticación vía JWT en header (Swagger UI / apps externas)
            Se utiliza como alternativa a la cookie `jwt` para pruebas desde Swagger UI,
            ya que Swagger no puede manejar cookies automáticamente como un navegador.
      security:
