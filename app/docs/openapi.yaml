openapi: 3.0.0
info:
  title: API Gol Ahora
  version: 1.0.0
  description: Documentación de rutas con control de acceso

servers:
  - url: https://golahora-proyecto-is.onrender.com/api
    description: Producción
  - url: http://localhost/api
    description: Servidor local
  - url: http://{ip}/api
    description: Servidor red local
    variables:
      ip:
        default: 192.168.100.66
        description: Dirección IP del servidor


tags:
  - name: "Acceso: Usuarios"
    description: Endpoints disponibles solo para usuarios autenticados (perfil, info propia).
  - name: "Acceso: Administradores"
    description: Endpoints restringidos a administradores.
  - name: "Acceso: Público"
    description: Endpoints de acceso libre, sin autenticación.
  - name: "Módulo: Gestión de Usuarios"
    description: CRUD de usuarios, perfiles y datos personales.
  - name: "Módulo: Gestión de Clientes"
    description: CRUD de clientes, perfiles y datos personales.
  - name: "Módulo: Gestión de Profesores"
    description: CRUD de profesores, perfiles y datos personales.
  - name: "Módulo: Gestión de Entrenadores"
    description: CRUD de entrenadores, perfiles y datos personales.
  - name: "Módulo: Gestion de Entrenadores (certificaciones)"
    description: Endpoints relacionados a las certificaciones de los Entrenadores
  - name: "Módulo: Gestion de Profesores (certificaciones)"
    description: Endpoints relacionados a las certificaciones de los Profesores
  - name: "Módulo: Gestión de Reservas"
    description: Endpoints para registrar, modificar y cancelar reservas.
  - name: "Módulo: Gestión de Canchas"
    description: Endpoints para administrar tipos de canchas y disponibilidad.
  - name: "Módulo: Catálogos de Referencia"
    description: Endpoints para obtener listas de datos básicos (paises, provincias, ciudades, localidades, géneros, etc).
  - name: "Servicio: Autenticación"
    description: Endpoints para login, logout y manejo de tokens.
  - name: "Servicio: Notificaciones"
    description: Endpoints para envío de correos, alertas y recordatorios.
  - name: "Servicio: Pagos"
    description: Endpoints para integración con medios de pago externos.
  - name: "Servicio: Archivo/Recursos"
    description: Endpoints para obtención de archivos binarios (imágenes, PDFs, documentos).
  - name: "Información"
    description: Endpoints que proveen información del sistema.

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: jwt
      description: Autenticación vía cookie JWT (plataform=web)
    authorization:
      type: apiKey
      in: header
      name: authorization
      description: Autenticación vía token (plataform=windows)

  schemas:
    UsuarioRegistro:
      type: object
      required:
        - nombre
        - apellido
        - dni
        - genero
        - fecha_nacimiento
        - telefono
        - email
        - calle
        - numero
        - codigo_postal
        - pais
        - provincia
        - ciudad
        - localidad
      properties:
        nombre:
          type: string
          example: Juan
        apellido:
          type: string
          example: Pérez
        nacionalidad:
          type: string
          example: Argentina
        dni:
          type: string
          example: 12345678
        genero:
          type: string
          example: Masculino
        fecha_nacimiento:
          type: string
          format: date
          example: 1990-05-23
        telefono:
          type: string
          example: +541112345678
        email:
          type: string
          format: email
          example: juan.perez@ejemplo.com
        password:
          type: string
          format: password
          example: "ContraseñaFuerte123!"
        confirm_password:
          type: string
          format: password
          example: "ContraseñaFuerte123!"
        calle:
          type: string
          example: San Martín
        numero:
          type: string
          example: 1234
        codigo_postal:
          type: string
          example: B1888
        pais:
          type: string
          example: Argentina
        provincia:
          type: string
          example: Buenos Aires
        ciudad:
          type: string
          example: Florencio Varela
        localidad:
          type: string
          example: Centro

    Usuario:
