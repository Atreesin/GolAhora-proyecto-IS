      tags:
        - "Acceso: Administradores"
        - "Servicio: Archivo/Recursos"
        - "Módulo: Gestion de Profesores (certificaciones)"
        - "Módulo: Gestion de Entrenadores (certificaciones)"
      parameters:
        - name: plataform
          in: header
          required: true
          schema:
            type: string
            enum: [web, windows]
          description: Plataforma desde la cual se accede.
        
        - name: X-Auth-Token
          in: header
          required: false
          schema:
            type: string
            pattern: '^jwt=.*$'
          description: |
            Autenticación vía JWT en header (Swagger UI / apps externas)
            Se utiliza como alternativa a la cookie `jwt` para pruebas desde Swagger UI,
            ya que Swagger no puede manejar cookies automáticamente como un navegador.
        - name: nombre
          in: path
          required: true
          schema:
            type: string
          description: Nombre del archivo de certificación
      security:
        - cookieAuth: []  
        - authorization: []  
      responses:
        '200':
          description: Archivo encontrado
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          description: Archivo no encontrado