<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Link rel="stylesheet" href="/css/style.css">
    <script type="module" src="register.js" defer></script>
    
</head>
<body>
    <main>
        <div class="form-container">
            <h1>Crear una cuenta</h1>
            <form id="register-form">
                <!-- User info-->
                <label for="nombre" class="sr-only">Nombre</label>
                <input type="text" name="nombre" id="nombre" placeholder="Nombre">
                <label for="apellido" class="sr-only">Apellido</label>
                <input type="text" name="apellido" id="apellido" placeholder="Apellido">
                <label for="nacionalidad" class="sr-only">Nacionalidad</label> 
                <input type="text" name="nacionalidad" id="nacionalidad" placeholder="Nacionalidad">
                <div><div id="nacionalidad-suggestions" class="suggestions"></div></div>
                <label for="dni" class="sr-only">dni</label>
                <input type="text" name="dni" id="dni" placeholder="DNI">
                <label for="genero" class="sr-only">genero</label>
                <input type="text" name="genero" id="genero" placeholder="Genero">
                <div><div id="genero-suggestions" class="suggestions"></div></div>
                <label for="fecha_nacimiento" class="sr-only">Fecha de Nacimiento</label>
                <input type="date" name="fecha_nacimiento" id="fecha_nacimiento" placeholder="Fecha de Nacimiento">
                <label for="telefono" class="sr-only">telefono</label>
                <input type="text" name="telefono" id="telefono" placeholder="telefono">
                <!-- Login info-->
                <label for="email" class="sr-only">Email</label>
                <input type="email" name="email" id="email" placeholder="Email">
                <label for="password" class="sr-only">Contraseña</label>
                <input type="password" name="password" id="password" placeholder="Contraseña">
                <label for="confirm_password" class="sr-only">Confirmar Contraseña</label>
                <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirmar Contraseña">
                <!-- Direccion-->
                <label for="calle" class="sr-only">calle</label>
                <input type="text" name="calle" id="calle" placeholder="Calle">
                <label for="numero" class="sr-only">número</label>
                <input type="text" name="numero" id="numero" placeholder="Número">
                <label for="codigo_postal" class="sr-only">código postal</label>
                <input type="text" name="codigo_postal" id="codigo_postal" placeholder="Código Postal">
                <!--
                <label for="pais" class="sr-only">país</label>
                <input type="text" name="pais" id="pais" placeholder="País">
                -->
                <label for="pais" class="sr-only">País</label>
                <input type="text" name="pais" id="pais" placeholder="País">
                <div><div id="pais-suggestions" class="suggestions"></div></div>
                
                <label for="provincia" class="sr-only">provincia</label>
                <input type="text" name="provincia" id="provincia" placeholder="Provincia">
                <div><div id="provincia-suggestions" class="suggestions"></div></div>

                <label for="ciudad" class="sr-only">ciudad</label>
                <input type="text" name="ciudad" id="ciudad" placeholder="Ciudad">
                <div><div id="ciudad-suggestions" class="suggestions"></div></div>

                <label for="localidad" class="sr-only">localidad</label>
                <input type="text" name="localidad" id="localidad" placeholder="localidad">
                <div><div id="localidad-suggestions" class="suggestions"></div></div>

                <button type="submit">Crear cuenta</button>
                <p class="error escondido">Error al registrarse</p>
            </form>
            <p>¿ya tienes una cuenta?? - <a href="/login">Iniciar sesión</a></p>
        </div>

        
    </main>
    <footer>
        <div class="footer">
            <div class="alumno">
                <p>Proyecto final Integrador</p>
                <p>Autores: <br>Equipo N° 6</p>
                <p>Universidad Nacional Arturo Jauretche</p>
                <p>Ingenieria de Software I - 1° cuatrimestre 2026</p>
            </div>

            
        </div>
    </footer>
</body>
</html>
