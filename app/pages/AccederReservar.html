<html lang="en">
<head>
        <meta charset="utf-8">
    <title>Acceder</title>

    <body>
   <div class="container-fluid g-0 min-vh-100">
    
    <div class="row g-0 min-vh-100 align-items-center">
        
        <div class=" col-12 col-md-4 mx-auto">
            <h2 class="text-center fw-bold text-white mb-4">Ingresar</h2>
            
            <form id="login">
                <div class="mb-3 text-start">
                    <label for="email" class="form-label fw-semibold text-secondary">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="ejemplo@correo.com" required>
                </div>
                
                <div class="mb-4 text-start">
                    <label for="password" class="form-label fw-semibold text-secondary">Contraseña</label>
                    <input type="password" class="form-control" id="password" placeholder="********" required>
                </div>
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-warning text-dark fw-bold rounded-pill p-2 text-center text-decoration-none">
                    Ingresar
                    </button>
                </div>
            </form>
        </div> 
        <div class="col-12 col-md-6">
            <img src="img/acceder3.jpeg" alt="imagen acceder" class="img-fluid">
        </div> 
        
    </div>

</div>
