<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <Link rel="stylesheet" href="/css/style.css">
    <script src="login.js" defer></script>
</head>
<body>
    <main>
        <div class="form-container">
            <h1>Iniciar seción</h1>
            <form id="login-form">
                <label for="email" class="sr-only">Email</label>
                <input type="email" name="email" id="email" placeholder="Email">
                <label for="password" class="sr-only">Contraseña</label>
                <input type="password" name="password" id="password" placeholder="Contraseña">
                <button type="submit">Conectarse</button>
                <p class="error escondido">Error al iniciar sesión</p>
            </form>
            <p>¿No tenes una cuenta? - <a href="/register">Régistrate</a></p>
        </div>
    </main>
    <footer>
        <div class="footer">
            <div class="alumno">
                <p>Proyecto final Integrador</p>
                <p>Autores: <br>Equipo N° 6</p>
                <p>Universidad Nacional Arturo Jauretche</p>
                <p>Ingenieria de Software I - 1° cuatrimestre 2026</p>
            </div>

            
        </div>
    </footer>
</body>
</html>
